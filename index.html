<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pancake Stack</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="Game stats">
        <div>
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">Stack</span>
          <strong id="stack">0</strong>
        </div>
        <div>
          <span class="label">Time</span>
          <strong id="time">60</strong>
        </div>
        <div>
          <span class="label">Level</span>
          <strong id="level">1</strong>
        </div>
      </section>

      <canvas id="game" width="900" height="560" aria-label="Pancake Stack game area"></canvas>

      <section class="controls" aria-label="Game controls">
        <button id="left" type="button" aria-label="Move plate left">&larr;</button>
        <button id="start" type="button">Start</button>
        <button id="right" type="button" aria-label="Move plate right">&rarr;</button>
      </section>

      <section class="speed-panel" aria-label="Falling item speed">
        <label for="speed">Falling speed</label>
        <input id="speed" type="range" min="45" max="120" value="70">
        <output id="speedLabel" for="speed">Easy</output>
      </section>

      <section class="speed-panel" aria-label="Game difficulty">
        <label for="difficulty">Difficulty</label>
        <input id="difficulty" type="range" min="1" max="5" value="2">
        <output id="difficultyLabel" for="difficulty">Easy</output>
      </section>

      <p id="message" class="message">Catch pancakes and fruit. Skip socks and forks.</p>
    </main>

    <script src="game.js"></script>
  </body>
</html>
